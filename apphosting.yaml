# Firebase App Hosting config for DoneGrading (Vite + React SPA)
# https://firebase.google.com/docs/app-hosting/configure

scripts:
  # npm ci is faster and more reliable in CI than npm install
  buildCommand: npm ci && npm run build
  runCommand: node server.js

# Include full project so node_modules (Express) is available; [dist, server.js] alone would exclude deps
outputFiles:
  serverApp:
    include: [.]
